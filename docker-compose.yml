version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: project_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-financial_assistant_db}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    container_name: project_backend
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-financial_assistant_db}
      DB_USER: ${PGUSER:-postgres}
      DB_PASSWORD: ${PGPASSWORD:-postgres}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: project_frontend
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data: 