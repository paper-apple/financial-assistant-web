services:
  - type: web
    name: financial-assistant-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: financial-assistant-db
          property: connectionString

databases:
  - name: financial-assistant-db
    databaseName: finance
    user: finance_user